swiftmailer:
    url: '%env(MAILER_DSN)%'
    spool:
        type: memory
    transport: smtp
    auth_mode: login
    encryption: tls
    port: 587
    host: '%env(MAILER_HOST)%'
    username: '%env(MAILER_USER)%'
    password: '%env(MAILER_PASSWORD)%'
    sender_address: '%env(MAILER_FROM)%'
    delivery_addresses: ['%env(MAILER_TO)%']
    disable_delivery: '%kernel.debug%'
    logging: '%kernel.debug%'
    local_domain: '%env(MAILER_DOMAIN)%'
    command: '/usr/sbin/sendmail -bs'
    stream_options:
        ssl:
            allow_self_signed: true
            verify_peer: false
    antiflood:
        threshold: 99
        sleep_time: 1